{% extends 'base.html' %}
{% load static %}
{% block content %}
<style>
    body {
        background-color: #f8f9fa;
    }
    .container-card {
        max-width: 500px;
        margin: auto;
    }
    .card-header {
        background-color: #007bff;
        color: #fff;
    }
    .btn-google {
        background-color: #4285f4;
        color: #fff;
    }
    .btn-google:hover {
        background-color: #357ae8;
    }
    .btn-login {
        background-color: #28a745;
        color: #fff;
    }
    .btn-login:hover {
        background-color: #218838;
    }
    .btn-profile {
        background-color: #6c757d;
        color: #fff;
    }
    .btn-profile:hover {
        background-color: #5a6268;
    }
</style>
</head>


<div class="container">
    <div class="container my-5">
        <div class="card" >
            <div class="card-header text-center">
                <h4 class="mb-0">Sign Up</h4>
            </div>
            <div class="card-body" >

               

                <!-- Your custom login form goes here -->
                <form action="/sign_up/" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Publication Name / Your Name</label>
                        <input type="text" class="form-control" id="Publication_name" name="Publication_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password:</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-login btn-block">Sign Up</button>
                </form>


            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (Include the Bootstrap JS file from a CDN or download and host it locally) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


{% endblock %}
