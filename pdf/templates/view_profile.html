{% extends 'base.html' %}
{% load static %}
{% block content %}
<style>
    body {
        background-color: #f8f9fa;
    }

    .container-card {
        max-width: 500px;
        margin: auto;
    }

    .card-header {
        background-color: #007bff;
        color: #fff;
    }

    .btn-google {
        background-color: #4285f4;
        color: #fff;
    }

    .btn-google:hover {
        background-color: #357ae8;
    }

    .btn-login {
        background-color: #28a745;
        color: #fff;
    }

    .btn-login:hover {
        background-color: #218838;
    }

    .btn-profile {
        background-color: #6c757d;
        color: #fff;
    }

    .btn-profile:hover {
        background-color: #5a6268;
    }
</style>


<style>
    .limit-lines {
        height: 3em;
        /* Adjust the value based on the desired fixed height */
        overflow: auto;
        text-overflow: ellipsis;
    }

    .limit-lines::-webkit-scrollbar {
        width: 0 !important;
        /* Hide scrollbar for WebKit browsers */
    }

    .limit-name {
        max-height: 1em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
</style>

<div class="container-fluid">
    <div class="">
        <div class="profile-picture text-center mt-5">
            {% if userimg %}
            <img src="/media/{{userimg}}" alt="Profile Picture" class="img-fluid overflow-hidden"
                style="border-radius: 100%;border: 5px solid green; width: 150px; height:150px;">
                {% else %}
                <img src="{% static '/images/profile.jpeg' %}" alt="Profile Picture" class="img-fluid"
                    style="border-radius: 100%;border: 5px solid green; width: 25vw;" onclick="selectimg()">
                    {% endif %}
        </div>
        <div class="user-info text-center">
            <h4 class="text-danger my-3"><u>{{pub_name}}</u></h4>
            <p class="text-success">{{desc}}</p>
        </div>

        <div class="posts mb-5">
            <h5 class="text-dark"><u>Posts</u></h5>
            <div class="container-fluid mb-5" style="border: 1px solid rgb(94, 93, 93); height: 60vh; overflow-y: scroll;">
                <div class="row mt-4">


                    {% for data in publication_data %}

                    <div class="col-md-3 mb-4">
                        <div class="card">
                            <a href="/view/{{data.pdf.pk}}">
                                <img src="{{ data.pdf.cover_image.url }}" class="card-img-top" alt="PDF Image"
                                    style="height: 150px; width: 100%; object-fit: cover; border: 1px solid gray;">
                                <div class="card-body">
                                    <p class="limit-lines text-dark"><b>{{ data.pdf.title }}</b></p>
                            </a>
                        </div>
                    </div>
                </div>
                {% endfor %}




            </div>
        </div>
    </div>
</div>
</div>

<!-- Bootstrap JS (Include the Bootstrap JS file from a CDN or download and host it locally) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


{% endblock %}
